<!DOCTYPE html>

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');

                        <path d="M4 12C7 12 8 9 12 9C16 9 17 12 20 12" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>

                    </svg>

            </div>
            <!-- Profile Link Mobile -->
            <a th:href="@{/configuracoes}" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; display: block;">

                     th:src="@{/images/avatars/avatar-placeholder.png}" 
                     alt="Avatar" 
                     style="width: 32px; height: 32px; object-fit: cover; border: 1.5px solid rgba(255,255,255,0.25);">
            </a>
        </div>

        <!-- Backdrop para Sidebar Mobile -->
        <div class="sidebar-backdrop d-lg-none" id="sidebarBackdrop"></div>

        <!-- Sidebar Esquerda -->
        <aside class="sidebar-wrapper">
            <!-- Brand Logo -->
            <div class="sidebar-brand d-flex align-items-center mb-5">
                <div class="logo-box-mini me-2 d-flex align-items-center justify-content-center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 7C7 7 8 4 12 4C16 4 17 7 20 7" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M4 12C7 12 8 9 12 9C16 9 17 12 20 12" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M4 17C7 17 8 14 12 14C16 14 17 17 20 17" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div>
                    <h1 class="brand-title mb-0">RentFlow</h1>
                    <span class="brand-subtitle">Gestão de Frotas</span>
                </div>
            </div>

            <!-- Profile Card -->
            <div class="profile-card-sidebar mb-4 d-flex align-items-center">
                <!-- Avatar Circular -->
                <div class="profile-avatar-container me-3" style="width: 40px; height: 40px; flex-shrink: 0;">
                    <img th:if="${usuarioLogado != null && usuarioLogado.fotoPerfil != null && !#strings.isEmpty(usuarioLogado.fotoPerfil)}"

                         class="rounded-circle"

                    <img th:unless="${usuarioLogado != null && usuarioLogado.fotoPerfil != null && !#strings.isEmpty(usuarioLogado.fotoPerfil)}" 
                         th:src="@{/images/avatars/avatar-placeholder.png}"

                </div>
                <!-- Informações do Usuário -->
                <div class="profile-info text-start">
                    <div class="profile-name fw-bold text-truncate" style="max-width: 140px;" th:text="${usuarioLogado != null ? usuarioLogado.nome : 'Usuário'}">Atendente</div>
                    <div class="profile-role">
                        <span sec:authorize="hasRole('GERENTE')" class="badge-role">GERENTE</span>
                        <span sec:authorize="hasRole('ATENDENTE')" class="badge-role" style="background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); color: #60a5fa;">ATENDENTE</span>

                </a>

                    <i class="bi bi-people-fill nav-icon-custom"></i> Clientes
                </a>
                <a th:href="@{/veiculos}" class="nav-item-custom" th:classappend="${activePage == 'veiculos' ? 'active' : ''}">
                    <i class="bi bi-car-front-fill nav-icon-custom"></i> Veículos
                </a>
                <a th:href="@{/locacoes}" class="nav-item-custom" th:classappend="${activePage == 'locacoes' ? 'active' : ''}">
                    <i class="bi bi-key-fill nav-icon-custom"></i> Locações
                </a>
                <a th:href="@{/manutencoes}" class="nav-item-custom" th:classappend="${activePage == 'manutencoes' ? 'active' : ''}">
                    <i class="bi bi-tools nav-icon-custom"></i> Manutenções
                </a>
                <a sec:authorize="hasRole('GERENTE')" th:href="@{/tabelas-auxiliares}" class="nav-item-custom" th:classappend="${activePage == 'auxiliares' ? 'active' : ''}">
                    <i class="bi bi-columns-gap nav-icon-custom"></i> Tabelas Auxiliares
                </a>
                <a th:href="@{/configuracoes}" class="nav-item-custom" th:classappend="${activePage == 'configuracoes' ? 'active' : ''}">

                    <i id="themeToggleIcon" class="bi bi-sun nav-icon-custom"></i> <span id="themeToggleText">Modo Claro</span>

        <!-- Área de Conteúdo Principal -->
        <main class="main-content-wrapper flex-grow-1 d-flex flex-column">
            <div class="container-fluid" layout:fragment="content">
                <!-- Conteúdo das telas filhas -->
            </div>

        </main>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
    
    <!-- Script de Alternância de Tema -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            const btn = document.getElementById('themeToggleBtn');
            const icon = document.getElementById('themeToggleIcon');
            const text = document.getElementById('themeToggleText');

            function updateThemeUI(isLight) {
                if (isLight) {
                    body.classList.add('light-theme');
                    if (icon) icon.className = 'bi bi-moon-stars nav-icon-custom';
                    if (text) text.textContent = 'Modo Escuro';
                } else {
                    body.classList.remove('light-theme');
                    if (icon) icon.className = 'bi bi-sun nav-icon-custom';
                    if (text) text.textContent = 'Modo Claro';
                }
            }

            // Inicializa a UI do botão de acordo com o estado do body
            const currentTheme = localStorage.getItem('theme');
            updateThemeUI(currentTheme === 'light');

            if (btn) {
                btn.addEventListener('click', () => {
                    const isLight = body.classList.toggle('light-theme');
                    localStorage.setItem('theme', isLight ? 'light' : 'dark');
                    updateThemeUI(isLight);
                });
            }
        });
    </script>
    <!-- Script de Auto-Submit para buscas -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let debounceTimer;
            document.querySelectorAll('.auto-submit').forEach(input => {
                const lastFocusId = sessionStorage.getItem('lastFocusId');
                if (lastFocusId && input.id === lastFocusId) {
                    input.focus();
                    const val = input.value;
                    input.value = '';
                    input.value = val;
                    sessionStorage.removeItem('lastFocusId');
                }

                input.addEventListener('input', function() {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        if(input.id) sessionStorage.setItem('lastFocusId', input.id);
                        const form = input.closest('form');
                        if(form) form.submit();
                    }, 600);
                });
            });

            // Correção para Modais do Bootstrap (Stacking Context)
            // Move todos os modais para fora das tabelas/cards e coloca direto no body
            // Isso evita que o backdrop (fundo escuro) fique por cima do modal
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                document.body.appendChild(modal);
            });

            // Lógica Global para Inputs Numéricos Customizados (+ e -)
            document.body.addEventListener('click', function(e) {
                const btn = e.target.closest('.btn-number');
                if (!btn) return;
                
                const action = btn.getAttribute('data-action');
                const container = btn.closest('.number-input-group');
                if (!container) return;
                
                const input = container.querySelector('input[type="number"]');
                
                if (input) {
                    let value = parseFloat(input.value) || 0;
                    const step = parseFloat(input.getAttribute('step')) || 1;
                    const min = input.hasAttribute('min') ? parseFloat(input.getAttribute('min')) : -Infinity;
                    const max = input.hasAttribute('max') ? parseFloat(input.getAttribute('max')) : Infinity;
                    
                    if (action === 'plus') {
                        if (value + step <= max) value += step;
                    } else if (action === 'minus') {
                        if (value - step >= min) value -= step;
                    }
                    
                    if(step < 1) {
                        const decimals = (step.toString().split('.')[1] || '').length;
                        input.value = value.toFixed(decimals);
                    } else {
                        input.value = value;
                    }
                    
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                }
            });

            // =====================================================
            // INICIALIZAÇÃO GLOBAL DO FLATPICKR (DATE PICKER)
            // =====================================================
            function customizeYearDropdown(instance) {
                const container = instance.calendarContainer;
                if (!container) return;
                
                container.querySelectorAll('.flatpickr-current-month').forEach(function(currentMonthEl) {
                    if (currentMonthEl.querySelector('.flatpickr-yearDropdown-years')) {
                        currentMonthEl.querySelector('.flatpickr-yearDropdown-years').value = instance.currentYear;
                        return;
                    }
                    
                    const numInputWrapper = currentMonthEl.querySelector('.numInputWrapper');
                    if (!numInputWrapper) return;
                    
                    numInputWrapper.style.display = 'none';
                    
                    const select = document.createElement('select');
                    select.className = 'flatpickr-monthDropdown-months flatpickr-yearDropdown-years';
                    select.style.marginLeft = '4px';
                    
                    const currentYear = new Date().getFullYear();
                    let minYear = currentYear - 100;
                    let maxYear = currentYear + 10;
                    
                    if (instance.config.minDate) {
                        minYear = instance.config.minDate.getFullYear();
                    }
                    if (instance.config.maxDate) {
                        maxYear = instance.config.maxDate.getFullYear();
                    }
                    
                    if (instance.currentYear < minYear) minYear = instance.currentYear;
                    if (instance.currentYear > maxYear) maxYear = instance.currentYear;
                    
                    for (let y = minYear; y <= maxYear; y++) {
                        const opt = document.createElement('option');
                        opt.value = y;
                        opt.textContent = y;
                        select.appendChild(opt);
                    }
                    
                    select.value = instance.currentYear;
                    
                    select.addEventListener('change', function(e) {
                        instance.changeYear(parseInt(e.target.value));
                    });
                    
                    currentMonthEl.appendChild(select);
                });
            }

            document.querySelectorAll('input[type="date"]').forEach(function(el) {
                const options = {
                    enableTime: false,
                    dateFormat: "Y-m-d",
                    altInput: true,
                    altFormat: "d/m/Y",
                    locale: "pt",
                    changeMonth: true,
                    changeYear: true,
                    onReady: function(s, d, instance) { customizeYearDropdown(instance); },
                    onMonthChange: function(s, d, instance) { customizeYearDropdown(instance); },
                    onYearChange: function(s, d, instance) { customizeYearDropdown(instance); },
                    onOpen: function(s, d, instance) { customizeYearDropdown(instance); }
                };
                if (el.name === 'previsaoSaida' || el.name === 'cnhValidade') {
                    options.minDate = "today";
                } else if (el.name === 'dataNascimento') {
                    const today = new Date();
                    const maxDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
                    options.maxDate = maxDate;
                }
                flatpickr(el, options);
            });

            document.querySelectorAll('input[type="datetime-local"]').forEach(function(el) {
                const options = {
                    enableTime: true,
                    dateFormat: "Y-m-d\\TH:i",
                    altInput: true,
                    altFormat: "d/m/Y H:i",
                    locale: "pt",
                    changeMonth: true,
                    changeYear: true,
                    onReady: function(s, d, instance) { customizeYearDropdown(instance); },
                    onMonthChange: function(s, d, instance) { customizeYearDropdown(instance); },
                    onYearChange: function(s, d, instance) { customizeYearDropdown(instance); },
                    onOpen: function(s, d, instance) { customizeYearDropdown(instance); }
                };
                if (el.id === 'dataDevolPrevistaInput') {
                    options.minDate = "today";
                }
                flatpickr(el, options);
            });

            // =====================================================
            // WIZARD MULTI-STEP FORM NAVIGATION
            // =====================================================
            document.querySelectorAll('.wizard-modal').forEach(function(modal) {
                const steps = modal.querySelectorAll('.wizard-step');
                const badge = modal.querySelector('.wizard-step-badge');
                const btnBack = modal.querySelector('.wizard-btn-back');
                const btnNext = modal.querySelector('.wizard-btn-next');
                const btnSubmit = modal.querySelector('.wizard-btn-submit');
                const btnCancel = modal.querySelector('.wizard-btn-cancel');
                const totalSteps = steps.length;
                let currentStep = 0;

                function showStep(index) {
                    steps.forEach(function(s, i) {
                        s.classList.toggle('active', i === index);
                    });
                    if (badge) badge.textContent = 'Passo ' + (index + 1) + ' de ' + totalSteps;
                    if (btnBack) btnBack.style.display = index === 0 ? 'none' : 'flex';
                    if (btnNext) btnNext.style.display = index === totalSteps - 1 ? 'none' : 'flex';
                    if (btnSubmit) btnSubmit.style.display = index === totalSteps - 1 ? 'flex' : 'none';
                    if (btnCancel) btnCancel.style.display = index === totalSteps - 1 ? 'inline-block' : 'none';
                }

                function validateCurrentStep() {
                    const activeStep = steps[currentStep];
                    const requiredFields = activeStep.querySelectorAll('[required]');
                    let valid = true;
                    requiredFields.forEach(function(field) {
                        if (!field.value || field.value.trim() === '') {
                            field.classList.add('is-invalid');
                            valid = false;
                        } else {
                            field.classList.remove('is-invalid');
                        }
                    });
                    return valid;
                }

                if (btnNext) {
                    btnNext.addEventListener('click', function() {
                        if (validateCurrentStep() && currentStep < totalSteps - 1) {
                            currentStep++;
                            showStep(currentStep);
                        }
                    });
                }

                if (btnBack) {
                    btnBack.addEventListener('click', function() {
                        if (currentStep > 0) {
                            currentStep--;
                            showStep(currentStep);
                        }
                    });
                }

                // Reset wizard when modal is closed
                modal.addEventListener('hidden.bs.modal', function() {
                    currentStep = 0;
                    showStep(0);
                    // Clear validation styles
                    modal.querySelectorAll('.is-invalid').forEach(function(el) {
                        el.classList.remove('is-invalid');
                    });
                });

                // Initialize
                showStep(0);
            });
        });
    </script>

    <!-- Modal de Detalhes Geral -->
    <div class="modal fade" id="detalhesModal" tabindex="-1" aria-hidden="true" style="z-index: 1080;">
        <div class="modal-dialog modal-lg modal-dialog-centered" id="detalhesModalDialog">
            <div class="modal-content" id="detalhesModalContent" style="border: 1px solid rgba(255, 255, 255, 0.08);">
                <!-- Carregado dinamicamente via AJAX -->
            </div>
        </div>
    </div>

    <!-- Script de Carregamento dos Detalhes -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Auto-dismiss success alerts (4s)
            const successAlerts = document.querySelectorAll('.alert-success-custom, .alert-success');
            successAlerts.forEach(alert => {
                setTimeout(() => {
                    const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                    if (bsAlert) bsAlert.close();
                }, 4000);
            });

            // Auto-dismiss error alerts (8s)
            const errorAlerts = document.querySelectorAll('.alert-danger-custom, .alert-danger');
            errorAlerts.forEach(alert => {
                setTimeout(() => {
                    const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                    if (bsAlert) bsAlert.close();
                }, 8000);
            });

            let detalhesModalInstance = null;

            // Função genérica de Paginação de Tabela
            window.paginateTable = function(tableEl, rowsPerPage = 5) {
                const tbody = tableEl.querySelector('tbody');
                if (!tbody) return;
                
                // Ignora linhas de cabeçalho vazias ou placeholders (usando colspan)
                const allRows = Array.from(tbody.querySelectorAll('tr')).filter(tr => !tr.querySelector('td[colspan]'));
                const totalRows = allRows.length;
                
                // Se o total de registros for menor ou igual ao limite por página, não precisa paginar
                if (totalRows <= rowsPerPage) {
                    return;
                }
                
                const totalPages = Math.ceil(totalRows / rowsPerPage);
                let currentPage = 1;
                
                // Criação do container da paginação (Estilo Premium)
                const nav = document.createElement('nav');
                nav.className = 'pagination-container';
                
                const infoSpan = document.createElement('span');
                infoSpan.className = 'pagination-info';
                
                const btnGroup = document.createElement('div');
                btnGroup.className = 'pagination-btn-group';
                
                const btnPrev = document.createElement('button');
                btnPrev.type = 'button';
                btnPrev.className = 'pagination-btn';
                btnPrev.innerHTML = '<i class="bi bi-chevron-left"></i>';
                
                const btnNext = document.createElement('button');
                btnNext.type = 'button';
                btnNext.className = 'pagination-btn';
                btnNext.innerHTML = '<i class="bi bi-chevron-right"></i>';
                
                btnPrev.addEventListener('click', () => {
                    if (currentPage > 1) {
                        goToPage(currentPage - 1);
                    }
                });
                
                btnNext.addEventListener('click', () => {
                    if (currentPage < totalPages) {
                        goToPage(currentPage + 1);
                    }
                });
                
                btnGroup.appendChild(btnPrev);
                
                // Botões numéricos de páginas
                for (let i = 1; i <= totalPages; i++) {
                    const btnPage = document.createElement('button');
                    btnPage.type = 'button';
                    btnPage.className = 'pagination-btn';
                    btnPage.textContent = i;
                    
                    btnPage.addEventListener('click', () => {
                        goToPage(i);
                    });
                    btnGroup.appendChild(btnPage);
                }
                
                btnGroup.appendChild(btnNext);
                nav.appendChild(infoSpan);
                nav.appendChild(btnGroup);
                
                // Insere o controle logo abaixo do div contêiner da tabela (.table-responsive)
                const responsiveDiv = tableEl.closest('.table-responsive') || tableEl;
                responsiveDiv.parentNode.insertBefore(nav, responsiveDiv.nextSibling);
                
                function goToPage(page) {
                    currentPage = page;
                    const start = (page - 1) * rowsPerPage;
                    const end = start + rowsPerPage;
                    
                    allRows.forEach((row, idx) => {
                        if (idx >= start && idx < end) {
                            row.style.display = '';
                        } else {
                            row.style.display = 'none';
                        }
                    });
                    
                    // Atualiza a aparência do botão ativo e dos desativados
                    const buttons = btnGroup.querySelectorAll('button:not(:first-child):not(:last-child)');
                    buttons.forEach((btn, idx) => {
                        const pageNum = idx + 1;
                        if (pageNum === page) {
                            btn.className = 'pagination-btn active';
                        } else {
                            btn.className = 'pagination-btn';
                        }
                    });
                    
                    // Controle das setas anterior/próximo
                    btnPrev.disabled = page === 1;
                    btnNext.disabled = page === totalPages;
                    
                    infoSpan.textContent = `Página ${page} de ${totalPages} (Total: ${totalRows} itens)`;
                }
                
                // Inicia na página 1
                goToPage(1);
            };

            window.abrirModalDetalhes = function(tipo, id) {
                const content = document.getElementById('detalhesModalContent');
                if (!content) return;

                // Mostra spinner de loading
                content.innerHTML = `
                    <div class="modal-body text-center py-5">
                        <div class="spinner-border text-primary mb-3" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                        <p class="text-secondary small mb-0">Buscando informações no RentFlow...</p>
                    </div>
                `;

                if (!detalhesModalInstance) {
                    detalhesModalInstance = new bootstrap.Modal(document.getElementById('detalhesModal'));
                }
                detalhesModalInstance.show();

                const urlMap = {
                    'locacao': 'locacoes',
                    'cliente': 'clientes',
                    'veiculo': 'veiculos',
                    'manutencao': 'manutencoes',
                    'funcionario': 'tabelas-auxiliares/funcionarios'
                };
                const base = urlMap[tipo] || tipo;
                const url = `/${base}/detalhes/${id}`;

                fetch(url)
                    .then(response => {
                        if (!response.ok) throw new Error('Erro ao carregar detalhes.');
                        return response.text();
                    })
                    .then(html => {
                        content.innerHTML = html;
                    })
                    .catch(err => {
                        content.innerHTML = `
                            <div class="modal-header border-bottom-0">
                                <h5 class="modal-title text-danger fw-bold">Erro de Carregamento</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body text-center py-4">
                                <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
                                <p class="mt-2 text-white">Não foi possível carregar os detalhes do registro.</p>
                                <p class="text-secondary small">${err.message}</p>
                            </div>
                        `;
                    });
            };

            // Event listener global para linhas clicáveis
            document.body.addEventListener('click', function(e) {
                const row = e.target.closest('.linha-clicavel');
                if (!row) return;

                // Não dispara se clicar em botões, links, inputs, modais existentes ou dropdowns
                if (e.target.closest('button, a, input, select, option, label, .modal, .dropdown-menu, [data-bs-toggle]')) {
                    return;
                }

                const tipo = row.getAttribute('data-detalhes-tipo');
                const id = row.getAttribute('data-detalhes-id');
                if (tipo && id) {
                    window.abrirModalDetalhes(tipo, id);
                }
            });

            // Mobile Sidebar Toggle logic
            const toggleBtn = document.getElementById('mobileSidebarToggleBtn');
            const sidebar = document.querySelector('.sidebar-wrapper');
            const backdrop = document.getElementById('sidebarBackdrop');

            if (toggleBtn && sidebar && backdrop) {
                function toggleSidebar() {
                    sidebar.classList.toggle('active');
                    backdrop.classList.toggle('active');
                }

                toggleBtn.addEventListener('click', toggleSidebar);
                backdrop.addEventListener('click', toggleSidebar);

                // Close sidebar when a link is clicked
                const sidebarLinks = sidebar.querySelectorAll('.nav-item-custom');
                sidebarLinks.forEach(link => {
                    link.addEventListener('click', () => {
                        sidebar.classList.remove('active');
                        backdrop.classList.remove('active');
                    });
                });
            }
        });
    </script>
</body>
</html>
