<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RentFlow</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Nosso CSS Customizado Premium -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body d-flex align-items-center justify-content-center min-vh-100">

    <div class="login-container">
        
        <!-- Mensagem de erro caso o login falhe -->
        <div th:if="${param.error}" class="alert alert-danger-custom text-center mb-4 fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Usuário ou senha inválidos.
        </div>

        <!-- Mensagem de logout com sucesso -->
        <div th:if="${param.logout}" class="alert alert-success-custom text-center mb-4 fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            Você saiu do sistema com sucesso.
        </div>

        <!-- Card de Login Glassmorphic -->
        <div class="login-card p-5 text-center">
            
            <!-- Logo Customizado (SVG Ondas azuis) -->
            <div class="logo-box mx-auto mb-4 d-flex align-items-center justify-content-center">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 7C7 7 8 4 12 4C16 4 17 7 20 7" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M4 12C7 12 8 9 12 9C16 9 17 12 20 12" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M4 17C7 17 8 14 12 14C16 14 17 17 20 17" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>

            <h2 class="fw-bold text-white mb-2 fs-3">Bem-vindo ao RentFlow</h2>
            <p class="text-secondary-custom mb-5 fs-6">Insira suas credenciais para acessar a plataforma</p>

            <form th:action="@{/login}" method="POST">
                <!-- Username Input -->
                <div class="input-group-custom mb-4 text-start">
                    <label for="username" class="form-label-custom">Email, CPF ou Username</label>
                    <div class="input-wrapper">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" id="username" name="username" class="form-control-custom" placeholder="nome.sobrenome, email ou CPF" required autofocus autocomplete="username">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="input-group-custom mb-5 text-start">
                    <label for="password" class="form-label-custom">Senha</label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" id="password" name="password" class="form-control-custom" placeholder="Sua senha" required autocomplete="current-password">
                        <button type="button" class="btn-toggle-password" onclick="togglePasswordVisibility()">
                            <i id="eye-icon" class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-login-submit w-100">
                    Entrar no Sistema <i class="bi bi-arrow-right ms-1"></i>
                </button>
            </form>

            <div class="login-footer mt-5">
                <span class="text-muted-custom">RentFlow Gestão de Frotas & Locação</span>
            </div>
        </div>
    </div>

    <!-- Script para alternar visibilidade da senha -->
    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('bi-eye');
                eyeIcon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('bi-eye-slash');
                eyeIcon.classList.add('bi-eye');
            }
        }
    </script>
</body>
</html>
